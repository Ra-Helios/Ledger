name: ledger_viewer
description: Ledger — personal expense viewer

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0a0c10"
  adaptive_icon_foreground: "assets/icon.png"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

dependencies:
  flutter:
    sdk: flutter

  # Google Sign-In OAuth for Android
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Google APIs
  googleapis: ^13.2.0
  http: ^1.2.2

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  shimmer: ^3.0.0

flutter:
  uses-material-design: true

